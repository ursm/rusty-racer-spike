# M1 — libv8-rusty: build a *library-TLS* librusty_v8.a from the denoland/rusty_v8
# GIT checkout (V8_FROM_SOURCE defaults to V8_TLS_USED_IN_LIBRARY on linux, and
# the git tree has the full third_party the crates.io tarball lacks). The gem
# build then points RUSTY_V8_ARCHIVE at this artifact instead of downloading
# Deno's bin-TLS prebuilt. Linux x86_64 first; widen later.
#
# Heavy + iteration-prone: a full V8 source build needs lots of disk/RAM/time.
# First run is exploratory — expect to tune disk cleanup, the LLVM version, and
# the artifact path.
name: "M1 libv8-rusty (library-TLS librusty_v8.a)"
on:
  workflow_dispatch:
    inputs:
      rusty_v8_tag:
        description: "denoland/rusty_v8 git tag to build (must match the gem's v8 crate version)"
        required: true
        default: "v150.0.0"
jobs:
  build:
    runs-on: "ubuntu-22.04"
    # Needs write access to publish the archive as a Release asset.
    permissions:
      contents: write
    timeout-minutes: 180
    steps:
      - name: "Free disk space (V8 build is large)"
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/.ghcup
          df -h /
      - name: "Install build prerequisites"
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 curl pkg-config libglib2.0-dev lld
          # bindgen parses V8's bundled libc++ headers with the SYSTEM libclang
          # (the V8 *compiler* clang is auto-downloaded separately). V8 15.0's
          # libc++ requires "Clang 21 and later" — libclang 19 fails bindgen
          # with "reference to unresolved using declaration". Use LLVM 21.
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 21
          sudo apt-get install -y libclang-21-dev clang-21
      - uses: "dtolnay/rust-toolchain@stable"
      - name: "Clone rusty_v8 ${{ inputs.rusty_v8_tag }}"
        run: |
          git clone --depth 1 --branch "${{ inputs.rusty_v8_tag }}" \
            --recurse-submodules --shallow-submodules \
            https://github.com/denoland/rusty_v8
      - name: "Build from source (library-TLS)"
        working-directory: rusty_v8
        env:
          V8_FROM_SOURCE: "1"
          # V8 15.0's vendored rust-toolchain is LLVM 23, so compile, the
          # rust-allocator's libclang_rt.builtins, AND bindgen must all use
          # clang 23. apt tops out at 21 (run 3 failed: builtins wanted clang/23
          # under llvm-21). clang 23 only exists as the chromium clang the build
          # downloads — so DON'T set CLANG_BASE_PATH (let build.rs download it to
          # target/release/clang, used for compile + builtins), and point bindgen
          # at that same downloaded clang. The path is created before bindgen
          # runs; clang-sys resolves LIBCLANG_PATH lazily.
          LIBCLANG_PATH: "${{ github.workspace }}/rusty_v8/target/release/clang/lib"
        run: cargo build --release -vv
      - name: "Stage and compress the static archive"
        run: |
          set -x
          archive="$(find rusty_v8/target/release -name 'librusty_v8*.a' -size +10M | head -1)"
          test -n "$archive" || { echo "no librusty_v8.a found"; find rusty_v8/target -name '*.a' | head; exit 1; }
          mkdir -p out
          # gzip so the asset (and every cibuildgem download) is ~tens of MB, not
          # ~190MB. The gem's build.rs (copy_archive) auto-detects the gzip magic
          # and inflates it, so a plain .a would also work — gzip just saves bandwidth.
          gzip -c "$archive" > "out/librusty_v8_release_x86_64-unknown-linux-gnu.a.gz"
          ls -lh out/
      - name: "Publish as a Release asset (consumed by cibuildgem via RUSTY_V8_ARCHIVE)"
        env:
          GH_TOKEN: "${{ github.token }}"
        run: |
          set -x
          tag="libv8-${{ inputs.rusty_v8_tag }}"
          # Prerelease, so it never shows up as the repo's "Latest release" —
          # those are the gem's own vX.Y.Z tags. Tolerate the release already
          # existing (a racing re-run) but surface any OTHER create error
          # instead of swallowing it; --clobber then replaces the asset.
          if ! err=$(gh release create "$tag" --prerelease \
            --title "librusty_v8 ${{ inputs.rusty_v8_tag }} (library-TLS)" \
            --notes "library-TLS \`librusty_v8.a\` built from the denoland/rusty_v8 ${{ inputs.rusty_v8_tag }} git checkout (which has the full third_party the crates.io tarball lacks). Consumed by cibuildgem.yaml via RUSTY_V8_ARCHIVE, so the gem CI links a prebuilt V8 instead of a 30-45 min source build." 2>&1); then
            echo "$err"
            echo "$err" | grep -qi 'already exists' || exit 1
          fi
          gh release upload "$tag" out/librusty_v8_release_x86_64-unknown-linux-gnu.a.gz --clobber
