# M1 — libv8-rusty: build a *library-TLS* librusty_v8.a from the denoland/rusty_v8
# GIT checkout (V8_FROM_SOURCE defaults to V8_TLS_USED_IN_LIBRARY on linux, and
# the git tree has the full third_party the crates.io tarball lacks). The gem
# build then points RUSTY_V8_ARCHIVE at this artifact instead of downloading
# Deno's bin-TLS prebuilt. Linux x86_64 first; widen later.
#
# Heavy + iteration-prone: a full V8 source build needs lots of disk/RAM/time.
# First run is exploratory — expect to tune disk cleanup, the LLVM version, and
# the artifact path.
name: "M1 libv8-rusty (library-TLS librusty_v8.a)"
on:
  workflow_dispatch:
    inputs:
      rusty_v8_tag:
        description: "denoland/rusty_v8 git tag to build (must match the gem's v8 crate version)"
        required: true
        default: "v150.0.0"
jobs:
  build:
    runs-on: "ubuntu-22.04"
    # Needs write access to publish the archive as a Release asset.
    permissions:
      contents: write
    timeout-minutes: 180
    steps:
      - name: "Free disk space (V8 build is large)"
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/.ghcup
          df -h /
      - name: "Install build prerequisites"
        run: |
          sudo apt-get update
          # clang/libclang-dev = ubuntu-22.04's stock LLVM 14. It exists only so
          # the v8 crate's build.rs can ATTEMPT bindgen; we do NOT consume the
          # generated Rust bindings (see the build step — bindgen is expected to
          # fail and is tolerated). The C++ *compiler* clang that actually builds
          # V8 is auto-downloaded by build.rs (LLVM 23), so the system libclang
          # version is irrelevant — installing a newer LLVM only makes bindgen
          # fail differently and is not worth the apt.llvm.org dance.
          sudo apt-get install -y python3 curl pkg-config libglib2.0-dev lld \
                                  clang libclang-dev
      - uses: "dtolnay/rust-toolchain@stable"
      - name: "Clone rusty_v8 ${{ inputs.rusty_v8_tag }}"
        run: |
          git clone --depth 1 --branch "${{ inputs.rusty_v8_tag }}" \
            --recurse-submodules --shallow-submodules \
            https://github.com/denoland/rusty_v8
      - name: "Force library-safe TLS in V8 (the whole point of this archive)"
        working-directory: rusty_v8
        run: |
          set -e
          # V8's `g_current_isolate_` is emitted with initial-exec TLS
          # (R_X86_64_TPOFF32) unless V8_TLS_LIBRARY_MODE is on. The
          # `-DV8_TLS_USED_IN_LIBRARY` cflag that V8_FROM_SOURCE sets does NOT
          # reliably reach that symbol's TU, so the stock archive can't link into
          # the gem's cdylib ("relocation R_X86_64_TPOFF32 against hidden symbol
          # g_current_isolate_ can not be used when making a shared object").
          # Force the macro on at the source so every TU uses the library-safe
          # (call-based) TLS access. Verified locally: the resulting .a links and
          # the gem suite passes; without it, linking fails.
          hdr=v8/src/common/thread-local-storage.h
          sed -i 's/^#define V8_TLS_LIBRARY_MODE 0$/#define V8_TLS_LIBRARY_MODE 1 \/\/ libv8-rusty: force library-safe TLS/' "$hdr"
          grep -n 'libv8-rusty: force library-safe TLS' "$hdr" || { echo "TLS patch did not apply (header layout changed?)"; exit 1; }
      - name: "Build from source (library-TLS)"
        working-directory: rusty_v8
        env:
          V8_FROM_SOURCE: "1"
          # The C++ compiler clang that builds V8 is auto-downloaded by build.rs
          # (LLVM 23) — DON'T set CLANG_BASE_PATH, let it land in
          # target/release/clang.
        run: |
          set -uo pipefail
          # We consume ONLY librusty_v8.a — the compiled C++ V8 + rusty_v8 glue
          # that ninja AR's near the end of the build. AFTER that, the v8 crate's
          # build.rs runs bindgen and compiles the Rust FFI bindings, and THAT
          # step fails: rusty_v8 150's hand-written bindings expect the
          # anonymous-enum names a specific libclang emits, so the stock
          # libclang-14 skews them ("cannot find value v8_String_WriteFlags_*")
          # — exactly as it does in the local reference build. That Rust failure
          # is irrelevant: the archive is already complete and the gem
          # regenerates its OWN bindings at gem-build time. So tolerate a non-zero
          # cargo exit and let the archive-existence check below be the real gate
          # (a genuine V8 compile failure leaves no .a and still fails the job).
          cargo build --release \
            || echo "::warning::cargo exited non-zero — bindgen/binding skew tolerated, verifying the archive was still produced"
          # `|| true`: GitHub runs `run:` under `bash -e -o pipefail`, where
          # `find | head -1` can exit 141 (head closes the pipe, find gets
          # SIGPIPE) if more than one archive ever matches — which would abort
          # the step before the existence gate. Today exactly one matches.
          archive="$(find target/release -name 'librusty_v8*.a' -size +10M | head -1 || true)"
          if [ -z "$archive" ]; then
            echo "::error::librusty_v8.a was not produced — real V8 build failure"
            find target -name '*.a' | head; exit 1
          fi
          echo "librusty_v8.a present: $archive ($(du -h "$archive" | cut -f1))"
      - name: "Stage and compress the static archive"
        run: |
          set -x
          archive="$(find rusty_v8/target/release -name 'librusty_v8*.a' -size +10M | head -1)"
          test -n "$archive" || { echo "no librusty_v8.a found"; find rusty_v8/target -name '*.a' | head; exit 1; }
          mkdir -p out
          # gzip so the asset (and every cibuildgem download) is ~tens of MB, not
          # ~190MB. The gem's build.rs (copy_archive) auto-detects the gzip magic
          # and inflates it, so a plain .a would also work — gzip just saves bandwidth.
          gzip -c "$archive" > "out/librusty_v8_release_x86_64-unknown-linux-gnu.a.gz"
          ls -lh out/
      - name: "Publish as a Release asset (consumed by cibuildgem via RUSTY_V8_ARCHIVE)"
        env:
          GH_TOKEN: "${{ github.token }}"
        run: |
          set -x
          tag="libv8-${{ inputs.rusty_v8_tag }}"
          # Prerelease, so it never shows up as the repo's "Latest release" —
          # those are the gem's own vX.Y.Z tags. Tolerate the release already
          # existing (a racing re-run) but surface any OTHER create error
          # instead of swallowing it; --clobber then replaces the asset.
          if ! err=$(gh release create "$tag" --prerelease \
            --title "librusty_v8 ${{ inputs.rusty_v8_tag }} (library-TLS)" \
            --notes "library-TLS \`librusty_v8.a\` built from the denoland/rusty_v8 ${{ inputs.rusty_v8_tag }} git checkout (which has the full third_party the crates.io tarball lacks). Consumed by cibuildgem.yaml via RUSTY_V8_ARCHIVE, so the gem CI links a prebuilt V8 instead of a 30-45 min source build." 2>&1); then
            echo "$err"
            echo "$err" | grep -qi 'already exists' || exit 1
          fi
          gh release upload "$tag" out/librusty_v8_release_x86_64-unknown-linux-gnu.a.gz --clobber
