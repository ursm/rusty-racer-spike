# Generated by `cibuildgem ci_template`, then scoped:
#   - linux x86_64 only (macOS/Windows deferred — add once the linux path is green).
#   - links a PREBUILT library-TLS librusty_v8.a (see RUSTY_V8_ARCHIVE) instead of
#     a 30-45 min V8 source build on every run. That archive is built once per V8
#     version by libv8-rusty.yml and published as a Release asset.
#   - scope so far = compile + test_native + install + release on x86_64-linux.
#     cibuildgem cross-compiles a fat gem (a per-Ruby binary for 3.3/3.4/4.0,
#     read from the gemspec's required_ruby_version), so the published gem covers
#     those rubies — but only on linux; other PLATFORMS fall back to the source
#     gem (a V8 build). Broadening to macOS/Windows (the os matrix) is deferred.
name: "Package and release the gem (precompiled V8)"
on:
  workflow_dispatch:
    inputs:
      release:
        description: "Release the gems on RubyGems.org if the build passes"
        required: false
        type: boolean
        default: false
env:
  CIBUILDGEM: 1
  # Link the prebuilt library-TLS librusty_v8.a from our Release instead of
  # building V8 from source. The default prebuilt librusty_v8 from Deno is
  # initial-exec TLS (R_X86_64_TPOFF32 under -shared, unusable in a cdylib), and
  # a V8_FROM_SOURCE build off the crates.io tarball is broken (it prunes the
  # third_party the source build needs). So we point at the library-TLS archive
  # libv8-rusty.yml builds from the rusty_v8 git checkout. The gem's build.rs
  # downloads and links it (gzip auto-detected). Must be in the process env to
  # reach the `cargo` invocation make spawns. BUMP this URL (and re-run
  # libv8-rusty.yml) whenever ext/rusty_racer/Cargo.toml's v8 version changes.
  RUSTY_V8_ARCHIVE: "https://github.com/ursm/rusty_racer/releases/download/libv8-v150.0.0/librusty_v8_release_x86_64-unknown-linux-gnu.a.gz"
jobs:
  compile:
    timeout-minutes: 30
    name: "Compile + package (prebuilt V8)"
    strategy:
      matrix:
        os: ["ubuntu-22.04"]
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v5"
      - name: "Verify RUSTY_V8_ARCHIVE matches the v8 crate version"
        run: |
          # Catch a v8 bump that forgot to re-run libv8-rusty.yml / edit the URL,
          # and a mistyped tag, BEFORE the long build 404s deep in build.rs.
          ver=$(grep -oP '^v8 = "\K[0-9][0-9.]*' ext/rusty_racer/Cargo.toml)
          case "$RUSTY_V8_ARCHIVE" in
            *"/libv8-v${ver}/"*) echo "RUSTY_V8_ARCHIVE matches v8 ${ver}" ;;
            *) echo "::error::RUSTY_V8_ARCHIVE ($RUSTY_V8_ARCHIVE) does not reference v8 ${ver} — bump the URL and re-run libv8-rusty.yml for tag libv8-v${ver}"; exit 1 ;;
          esac
      - name: "Setup Ruby"
        uses: "ruby/setup-ruby@v1"
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: "."
      - name: "Run cibuildgem"
        uses: "shopify/cibuildgem/.github/actions/cibuildgem@main"
        with:
          step: "compile"
          working-directory: "."
  test:
    timeout-minutes: 30
    name: "Run the probe suite natively"
    needs: compile
    strategy:
      matrix:
        os: ["ubuntu-22.04"]
        rubies: ["3.3"]
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v5"
      - name: "Setup Ruby"
        uses: "ruby/setup-ruby@v1"
        with:
          ruby-version: "${{ matrix.rubies }}"
          bundler-cache: true
          working-directory: "."
      - name: "Run cibuildgem"
        uses: "shopify/cibuildgem/.github/actions/cibuildgem@main"
        with:
          step: "test_native"
          working-directory: "."
  install:
    timeout-minutes: 10
    name: "Verify the packaged gem installs"
    needs: test
    strategy:
      matrix:
        os: ["ubuntu-22.04"]
    runs-on: "${{ matrix.os }}"
    steps:
      # No checkout needed: cibuildgem downloads the compile job's gem artifact
      # and `gem install`s it — the .so is already baked in (V8 is not linked
      # here; the inherited RUSTY_V8_ARCHIVE is unused). The fat gem carries a
      # binary for each of Ruby 3.3/3.4/4.0, so installing on the newest (4.0)
      # exercises that version's dispatch path; the smoke step then loads it.
      - name: "Setup Ruby"
        uses: "ruby/setup-ruby@v1"
        with:
          ruby-version: "4.0"
      - name: "Run cibuildgem"
        uses: "shopify/cibuildgem/.github/actions/cibuildgem@main"
        with:
          step: "install"
      - name: "Smoke-test that the installed gem loads and runs"
        # cibuildgem's install only `gem install`s the precompiled gem — it never
        # `require`s it. The fat gem ships a per-Ruby binary under
        # rusty_racer/<major.minor>/, so a broken version-dispatch loader would
        # pass CI yet LoadError for every user. Actually load it (exercising the
        # loader against the installed gem, no -Ilib) and run one eval.
        run: ruby -e 'require "rusty_racer"; abort("eval failed") unless RustyRacer::Isolate.new.context.eval("40 + 2") == 42; puts "installed gem loads + runs OK"'
  release:
    name: "Release the gem on RubyGems"
    needs: install
    # Only when the dispatch asked for it; gated behind the whole build passing.
    if: ${{ inputs.release }}
    # Trusted publishing: cibuildgem's release step runs
    # rubygems/configure-rubygems-credentials (OIDC) + `cibuildgem release`, so
    # the job needs id-token: write. `environment: release` matches the RubyGems
    # pending trusted publisher (repo ursm/rusty_racer, workflow cibuildgem.yaml,
    # environment release) — keep them in sync.
    environment: release
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 10
    runs-on: "ubuntu-22.04"
    steps:
      # Ruby 4.0 (latest 4.0.x; matching cibuildgem's template / rubydex): release does no
      # native build, so ABI doesn't matter, but trusted-publishing OIDC `gem
      # push` wants a recent RubyGems — older 3.3-bundled RubyGems is risky.
      - name: "Setup Ruby"
        uses: "ruby/setup-ruby@v1"
        with:
          ruby-version: "4.0"
      - name: "Run cibuildgem"
        uses: "shopify/cibuildgem/.github/actions/cibuildgem@main"
        with:
          step: "release"
