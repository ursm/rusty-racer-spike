# Generated by `cibuildgem ci_template`, then scoped:
#   - linux x86_64 only (macOS/Windows deferred — add once the linux path is green).
#   - links a PREBUILT library-TLS librusty_v8.a (see RUSTY_V8_ARCHIVE) instead of
#     a 30-45 min V8 source build on every run. That archive is built once per V8
#     version by libv8-rusty.yml and published as a Release asset.
#   - first milestone = compile + test_native (proves the extension links as a
#     cdylib and the suite passes). cross/install/release/macOS deferred.
name: "Package gem with precompiled binaries"
on:
  workflow_dispatch:
    inputs:
      release:
        description: "Release the gems on RubyGems.org if the build passes"
        required: false
        type: boolean
        default: false
env:
  CIBUILDGEM: 1
  # Link the prebuilt library-TLS librusty_v8.a from our Release instead of
  # building V8 from source. The default prebuilt librusty_v8 from Deno is
  # initial-exec TLS (R_X86_64_TPOFF32 under -shared, unusable in a cdylib), and
  # a V8_FROM_SOURCE build off the crates.io tarball is broken (it prunes the
  # third_party the source build needs). So we point at the library-TLS archive
  # libv8-rusty.yml builds from the rusty_v8 git checkout. The gem's build.rs
  # downloads and links it (gzip auto-detected). Must be in the process env to
  # reach the `cargo` invocation make spawns. BUMP this URL (and re-run
  # libv8-rusty.yml) whenever ext/rusty_racer/Cargo.toml's v8 version changes.
  RUSTY_V8_ARCHIVE: "https://github.com/ursm/rusty_racer/releases/download/libv8-v150.0.0/librusty_v8_release_x86_64-unknown-linux-gnu.a.gz"
jobs:
  compile:
    timeout-minutes: 30
    name: "Compile + package (prebuilt V8)"
    strategy:
      matrix:
        os: ["ubuntu-22.04"]
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v5"
      - name: "Verify RUSTY_V8_ARCHIVE matches the v8 crate version"
        run: |
          # Catch a v8 bump that forgot to re-run libv8-rusty.yml / edit the URL,
          # and a mistyped tag, BEFORE the long build 404s deep in build.rs.
          ver=$(grep -oP '^v8 = "\K[0-9][0-9.]*' ext/rusty_racer/Cargo.toml)
          case "$RUSTY_V8_ARCHIVE" in
            *"/libv8-v${ver}/"*) echo "RUSTY_V8_ARCHIVE matches v8 ${ver}" ;;
            *) echo "::error::RUSTY_V8_ARCHIVE ($RUSTY_V8_ARCHIVE) does not reference v8 ${ver} — bump the URL and re-run libv8-rusty.yml for tag libv8-v${ver}"; exit 1 ;;
          esac
      - name: "Setup Ruby"
        uses: "ruby/setup-ruby@v1"
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: "."
      - name: "Run cibuildgem"
        uses: "shopify/cibuildgem/.github/actions/cibuildgem@main"
        with:
          step: "compile"
          working-directory: "."
  test:
    timeout-minutes: 30
    name: "Run the probe suite natively"
    needs: compile
    strategy:
      matrix:
        os: ["ubuntu-22.04"]
        rubies: ["3.3"]
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v5"
      - name: "Setup Ruby"
        uses: "ruby/setup-ruby@v1"
        with:
          ruby-version: "${{ matrix.rubies }}"
          bundler-cache: true
          working-directory: "."
      - name: "Run cibuildgem"
        uses: "shopify/cibuildgem/.github/actions/cibuildgem@main"
        with:
          step: "test_native"
          working-directory: "."
