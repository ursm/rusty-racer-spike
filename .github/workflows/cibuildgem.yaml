# Generated by `cibuildgem ci_template`, then scoped:
#   - platforms: x86_64-linux, aarch64-linux, arm64-darwin, x86_64-darwin. Each
#     produces a fat gem (a per-Ruby binary for 3.3/3.4/4.0, from
#     required_ruby_version). aarch64-linux runs NATIVELY on ubuntu-22.04-arm: it
#     only downloads the prebuilt archive + native-cargo-builds the small
#     extension (no V8 source build), so the arm64 host is fine here — it is
#     libv8-rusty that must cross-compile the aarch64 archive from an x86_64 host.
#     DEFERRED: Windows (V8's Windows prebuilt is MSVC but Ruby is mingw — the
#     static-lib link is unproven).
#   - LINUX links a prebuilt library-TLS librusty_v8.a (RUSTY_V8_ARCHIVE) instead
#     of a ~1h V8 source build: the initial-exec-TLS problem (R_X86_64_TPOFF32
#     under -shared) is linux-specific, so macOS uses Deno's STOCK prebuilt
#     rusty_v8 (no archive set). The archive is built once per V8 version by
#     libv8-rusty.yml and published as a Release asset; the URL is DERIVED from
#     ext/rusty_racer/Cargo.toml's v8 version, so bumping v8 only needs a
#     libv8-rusty.yml re-run, not an edit here.
name: "Package and release the gem (precompiled V8)"
on:
  # Push a vX.Y.Z tag to build + publish that version (see verify_tag — the tag
  # must match lib/rusty_racer/version.rb). workflow_dispatch stays for building
  # without releasing (release: false) or a manual publish off a branch.
  push:
    tags:
      - "v[0-9]*"
  workflow_dispatch:
    inputs:
      release:
        description: "Release the gems on RubyGems.org if the build passes"
        required: false
        type: boolean
        default: false
env:
  CIBUILDGEM: 1
jobs:
  # Fail the whole run fast (before the ~30-min build matrix) if a release tag
  # doesn't match the packaged version: cibuildgem publishes whatever version.rb
  # says, NOT the tag, so a v0.2.0 tag on a 0.1.0 version.rb would silently ship
  # 0.1.0. A no-op on workflow_dispatch (no tag to check).
  verify_tag:
    name: "Tag matches the gem version"
    runs-on: "ubuntu-22.04"
    steps:
      - uses: "actions/checkout@v6"
      - name: "On a tag push, the tag must equal lib/rusty_racer/version.rb"
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" != "tag" ]; then
            echo "not a tag push — nothing to check"; exit 0
          fi
          # Read the constant itself (quote-agnostic, single source of truth)
          # rather than grepping the literal — the gem's style may switch quotes.
          version=$(ruby -Ilib -e 'require "rusty_racer/version"; print RustyRacer::VERSION')
          tag="${GITHUB_REF_NAME#v}"
          if [ "$version" != "$tag" ]; then
            echo "::error::tag v$tag != gem version $version — bump lib/rusty_racer/version.rb or retag"
            exit 1
          fi
          echo "tag v$tag matches gem version $version"
  compile:
    needs: verify_tag
    timeout-minutes: 30
    name: "Compile + package (${{ matrix.os }})"
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-22.04", "ubuntu-22.04-arm", "macos-latest", "macos-26-intel"]
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v6"
      - name: "Point at the prebuilt library-TLS V8 (linux only)"
        # macOS links Deno's stock prebuilt rusty_v8 (no archive). Only linux
        # needs our custom library-TLS archive, so set it here (per-arch, derived
        # from the v8 crate version) rather than as a workflow-level env — that
        # way it is simply absent on macOS. Fail early with a clear message if
        # the asset is missing (e.g. libv8-rusty.yml not yet run for this arch).
        if: "${{ runner.os == 'Linux' }}"
        run: |
          ver=$(grep -oP '^v8 = "\K[0-9][0-9.]*' ext/rusty_racer/Cargo.toml)
          case "$(uname -m)" in
            x86_64)  triple=x86_64-unknown-linux-gnu ;;
            aarch64) triple=aarch64-unknown-linux-gnu ;;
            *) echo "::error::unsupported linux arch $(uname -m)"; exit 1 ;;
          esac
          url="https://github.com/${{ github.repository }}/releases/download/libv8-v${ver}/librusty_v8_release_${triple}.a.gz"
          curl -fsI "$url" >/dev/null || { echo "::error::$url not found — run libv8-rusty.yml for v8 ${ver} (${triple}) first"; exit 1; }
          echo "RUSTY_V8_ARCHIVE=$url" >> "$GITHUB_ENV"
          echo "linking $url"
      - name: "Setup Ruby"
        uses: "ruby/setup-ruby@v1"
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: "."
      - name: "Run cibuildgem"
        uses: "shopify/cibuildgem/.github/actions/cibuildgem@main"
        with:
          step: "compile"
          working-directory: "."
  test:
    timeout-minutes: 30
    name: "Test natively (${{ matrix.os }})"
    needs: compile
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-22.04", "ubuntu-22.04-arm", "macos-latest", "macos-26-intel"]
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v6"
      - name: "Point at the prebuilt library-TLS V8 (linux only)"
        # test_native recompiles the extension, so it links V8 too (like compile).
        # The compile job already verified the asset exists this run. KEEP THIS
        # DERIVATION IN SYNC with the compile job's step above.
        if: "${{ runner.os == 'Linux' }}"
        run: |
          ver=$(grep -oP '^v8 = "\K[0-9][0-9.]*' ext/rusty_racer/Cargo.toml)
          case "$(uname -m)" in
            x86_64)  triple=x86_64-unknown-linux-gnu ;;
            aarch64) triple=aarch64-unknown-linux-gnu ;;
            *) echo "::error::unsupported linux arch $(uname -m)"; exit 1 ;;
          esac
          echo "RUSTY_V8_ARCHIVE=https://github.com/${{ github.repository }}/releases/download/libv8-v${ver}/librusty_v8_release_${triple}.a.gz" >> "$GITHUB_ENV"
      - name: "Setup Ruby"
        uses: "ruby/setup-ruby@v1"
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: "."
      - name: "Run cibuildgem"
        uses: "shopify/cibuildgem/.github/actions/cibuildgem@main"
        with:
          step: "test_native"
          working-directory: "."
  install:
    timeout-minutes: 10
    name: "Verify the packaged gem installs (${{ matrix.os }})"
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-22.04", "ubuntu-22.04-arm", "macos-latest", "macos-26-intel"]
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Setup Ruby"
        uses: "ruby/setup-ruby@v1"
        with:
          ruby-version: "4.0"
      - name: "Download the compiled gems"
        # Same artifact the compile leg uploaded for this platform.
        uses: "actions/download-artifact@v5"
        with:
          name: "stage-${{ runner.os }}-${{ runner.arch }}"
      - name: "Install ONLY the precompiled platform gem, then load it"
        # NOT `gem install pkg/*.gem`: that also installs the source gem, whose
        # extension build has no RUSTY_V8_ARCHIVE here and so falls back to Deno's
        # initial-exec-TLS prebuilt → the R_X86_64_TPOFF32 cdylib-link failure on
        # linux (the very thing the precompiled gem exists to avoid; the source
        # path is the user's fallback and is exercised by compile/test). Install
        # just the platform gem (the .so is baked in) and `require` it (no -Ilib)
        # to prove the version-dispatch loader picks the right binary — cibuildgem
        # only `gem install`s, never loads, so a broken loader would slip by. The
        # fat gem carries a binary per Ruby 3.3/3.4/4.0; running on 4.0 exercises
        # that dispatch path.
        run: |
          plat_gem=$(ls pkg/*.gem | grep -E -- '-(x86_64|arm64|aarch64)-(linux|darwin)\.gem$')
          echo "installing $plat_gem"
          gem install "$plat_gem"
          ruby -e 'require "rusty_racer"; abort("eval failed") unless RustyRacer::Isolate.new.context.eval("40 + 2") == 42; puts "installed gem loads + runs OK"'
  release:
    name: "Release the gem on RubyGems"
    needs: install
    # Never publish two runs concurrently (two tags pushed back-to-back, or a tag
    # racing a manual dispatch): serialize the publish, don't cancel the first.
    concurrency:
      group: "rubygems-release"
      cancel-in-progress: false
    # Publish on a vX.Y.Z tag push, or on a manual dispatch that ticked release.
    # Gate on the EVENT, not github.ref_type: a workflow_dispatch launched from a
    # tag ref also has ref_type == 'tag', which would publish even with
    # release: false. The push trigger is tag-only (see `on:`), so event_name ==
    # 'push' means exactly "a vX.Y.Z tag was pushed".
    # Gated behind the whole build passing: the compile/test/install needs-chain
    # is intentionally all-or-nothing — a `needs` on a matrix job requires EVERY
    # leg to succeed, so if any platform fails we publish nothing (a release
    # should ship all platforms together, not a partial set). fail-fast: false
    # still lets every leg run so we see which platform failed before re-running.
    if: ${{ github.event_name == 'push' || inputs.release }}
    # Trusted publishing: cibuildgem's release step runs
    # rubygems/configure-rubygems-credentials (OIDC) + `cibuildgem release`, so
    # the job needs id-token: write. `environment: release` matches the RubyGems
    # pending trusted publisher (repo ursm/rusty_racer, workflow cibuildgem.yaml,
    # environment release) — keep them in sync.
    environment: release
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 10
    runs-on: "ubuntu-22.04"
    steps:
      # Ruby 4.0 (latest 4.0.x; matching cibuildgem's template / rubydex): release
      # does no native build, so ABI doesn't matter, but trusted-publishing OIDC
      # `gem push` wants a recent RubyGems — older 3.3-bundled RubyGems is risky.
      - name: "Setup Ruby"
        uses: "ruby/setup-ruby@v1"
        with:
          ruby-version: "4.0"
      - name: "Run cibuildgem"
        uses: "shopify/cibuildgem/.github/actions/cibuildgem@main"
        with:
          step: "release"
