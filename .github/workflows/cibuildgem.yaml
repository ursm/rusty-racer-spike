# Generated by `cibuildgem ci_template`, then scoped for the spike:
#   - linux x86_64 only (macOS/Windows V8 source builds are extra friction;
#     csim/Discourse target linux). Add them once the linux path is green.
#   - working-directory: gem  (the gem lives under gem/, not the repo root)
#   - long timeouts: the extension does a V8 *source* build (V8_FROM_SOURCE),
#     ~30-45 min on a CI runner, vs the 20 min default.
#   - first milestone = compile + test_native (proves V8 builds, links as a
#     cdylib, and the 10 probes pass). cross/install/release/macOS deferred.
name: "Package gem with precompiled binaries (spike)"
on:
  workflow_dispatch:
    inputs:
      release:
        description: "Release the gems on RubyGems.org if the build passes"
        required: false
        type: boolean
        default: false
env:
  CIBUILDGEM: 1
jobs:
  compile:
    timeout-minutes: 120
    name: "Compile + package (V8 from source)"
    strategy:
      matrix:
        os: ["ubuntu-22.04"]
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v5"
      - name: "Setup Ruby"
        uses: "ruby/setup-ruby@v1"
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: gem
      - name: "Run cibuildgem"
        uses: "shopify/cibuildgem/.github/actions/cibuildgem@main"
        with:
          step: "compile"
          working-directory: gem
  test:
    timeout-minutes: 120
    name: "Run the probe suite natively"
    needs: compile
    strategy:
      matrix:
        os: ["ubuntu-22.04"]
        rubies: ["3.3"]
    runs-on: "${{ matrix.os }}"
    steps:
      - name: "Checkout code"
        uses: "actions/checkout@v5"
      - name: "Setup Ruby"
        uses: "ruby/setup-ruby@v1"
        with:
          ruby-version: "${{ matrix.rubies }}"
          bundler-cache: true
          working-directory: gem
      - name: "Run cibuildgem"
        uses: "shopify/cibuildgem/.github/actions/cibuildgem@main"
        with:
          step: "test_native"
          working-directory: gem
