# Dependabot keeps the three dependency surfaces current. Minor+patch bumps are
# grouped into one PR per ecosystem per week to keep the noise down; majors come
# as their own PRs (they usually want a human look).
version: 2
updates:
  # GitHub Actions used by cibuildgem.yaml / libv8-rusty.yml.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        update-types: ["minor", "patch"]

  # The Rust extension (root workspace -> ext/rusty_racer).
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # The v8 crate is pinned and bumped by HAND, never by Dependabot: a version
      # change is a coordinated, multi-step job — rebuild the library-TLS
      # librusty_v8.a archive (libv8-rusty.yml), re-verify the V8-internal-symbol
      # FFI in set_v8_stack_limit/discover_scan_start_field, and re-check the
      # fiber stack handling against the new V8. A lone Cargo.toml bump can't even
      # build in CI (cibuildgem links the version-matched prebuilt archive).
      - dependency-name: "v8"

  # Ruby dev dependencies (Gemfile + gemspec: rake, rake-compiler, rb_sys, …).
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      bundler-minor-patch:
        update-types: ["minor", "patch"]
